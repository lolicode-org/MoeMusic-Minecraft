modLoader="kotlinforforge"
loaderVersion="[6.0,)"
license="${mod_license}"

[[mods]]
modId="${mod_id}"
version="${mod_version}"
displayName="${mod_name}"
displayURL = "https://github.com/lolicode-org/MoeMusic"
authors="KoishiMoe"
description='''
Server-synced music streaming for Minecraft.
'''
logoFile="assets/moemusic/icon.png"

[[mixins]]
config="${mod_id}.mixins.json"

[[mixins]]
config="${mod_id}.client.mixins.json"

[[dependencies.${mod_id}]]
modId="neoforge"
type="required"
versionRange="[${neo_version},)"
ordering="NONE"
side="BOTH"

[[dependencies.${mod_id}]]
modId="minecraft"
type="required"
versionRange="${minecraft_version_range}"
ordering="NONE"
side="BOTH"

[[dependencies.${mod_id}]]
modId="cloth_config"
type="optional"
versionRange="[26,)"
ordering="NONE"
side="CLIENT"

[[dependencies.${mod_id}]]
modId="badpackets"
type="required"
versionRange="[0.12,)"
ordering="NONE"
side="BOTH"

[[dependencies.${mod_id}]]
modId="kotlinforforge"
type="required"
versionRange="[6.0,)"
ordering="AFTER"
side="BOTH"

[[dependencies.${mod_id}]]
modId="luckperms"
type="optional"
versionRange="[5.5,)"
ordering="NONE"
side="SERVER"
